<!-- footer.html -->
<style>
:root{
  --page-side-padding: 3.3rem;
  --border: #e4e2dd;
  --text: #67677a;
  --transition: 0.28s cubic-bezier(.4,0,.2,1);
  --accent: #1e7bf6;
}

footer.site-footer{
  border-top: 1px solid var(--border);
  padding: 1.75rem 0;
  margin-top: 3rem;
  background: transparent;
}
.footer-inner{
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 var(--page-side-padding);
  display:flex; align-items:center; justify-content:space-between;
  gap:12px;
}
.footer-copy{ font-size:0.78rem; color:var(--text); }
.footer-up{ font-size:0.78rem; font-weight:600; color:var(--text); display:inline-flex; align-items:center; gap:.35rem; transition: color var(--transition) }
.footer-up:hover{ color:var(--accent) }

/* accessibility */
.footer-up:focus { outline: 3px solid rgba(30,123,246,0.12); outline-offset:3px; }

@media (max-width:768px){
  .footer-inner{ flex-direction:column; text-align:center; gap:10px; padding:0 1.5rem; }
}
</style>

<footer class="site-footer" role="contentinfo">
  <div class="footer-inner">
    <p class="footer-copy">© Jan Escoda 2026. All rights reserved.</p>
    <a class="footer-up" href="#top" id="footerUp" role="button">
      Scroll up
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </a>
  </div>
</footer>

<script>
/* scrollToTop helper — self-contained */
(function(){
  window.scrollToTop = function scrollToTop(e){
    if(e) e.preventDefault();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // Attach click to footer link if injected
  document.addEventListener('click', function(e){
    const el = e.target.closest && e.target.closest('#footerUp');
    if(el) scrollToTop(e);
  }, {capture:true});
})();
</script>

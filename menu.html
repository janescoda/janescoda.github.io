<!-- menu.html -->
<style>
/* Nav + copy button (self-contained, no font import) */
:root{
  --nav-height: 4.6rem;
  --page-side-padding: 3.3rem;
  --title: #000;
  --text: #67677a;
  --border: #e4e2dd;
  --transition: 0.28s cubic-bezier(.4,0,.2,1);
  --accent-blue: #1e7bf6;
}

.site-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-height);
  display:flex; align-items:center; justify-content:center;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(10px);
  z-index: 999;
  border-bottom: 1px solid rgba(10,10,12,0.04);
}
.site-nav .nav-inner {
  width:100%; max-width:1200px; padding:0 var(--page-side-padding);
  display:flex; justify-content:space-between; align-items:center;
}
.nav-logo { font-weight:800; color:var(--title); letter-spacing:-0.02em; font-size:1.05rem; }
.nav-right { display:flex; gap:1.6rem; align-items:center; }
.nav-link { color:var(--text); font-weight:600; font-size:.95rem; padding:.25rem .15rem; }
.nav-link:hover, .nav-link.is-active { color:var(--title); font-weight:800; }

/* Copy-email button */
.copy-btn{
  font-family: inherit;
  font-weight:700;
  font-size:0.98rem;
  padding:0.45rem 1rem;
  border-radius:999px;
  background:var(--title);
  color:#fff;
  border:1.5px solid var(--title);
  display:inline-flex; align-items:center; gap:.35rem;
  cursor:pointer; transition: all var(--transition);
}
.copy-btn.copied { background:transparent; color:var(--title); border-color:var(--title); pointer-events:none; }
.copy-btn:hover { transform:translateY(-1px); background:transparent; color:var(--title); }

/* accessibility focus */
.site-nav a:focus, .site-nav button:focus { outline: 3px solid rgba(30,123,246,0.12); outline-offset:3px; }
@media (max-width:768px){
  .nav-right { gap:12px; }
  .nav-logo { font-size:1rem; }
}
</style>

<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html#scroll">JEO</a>

    <div class="nav-right" role="menubar">
      <a class="nav-link is-active" href="index.html#work" role="menuitem">Work</a>
      <a class="nav-link" href="about.html" role="menuitem">About</a>

      <button class="copy-btn" id="copyBtn" aria-label="Copy email">
        <span class="label-default">Copy email</span>
        <span class="label-copied" style="display:none;">
          <svg class="check-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
          Copied
        </span>
      </button>
    </div>
  </div>
</nav>

<script>
/* copyEmail + fallback — self-contained */
(function(){
  function fallbackCopy(text){
    const el = document.createElement('textarea');
    el.value = text;
    el.style.position = 'fixed';
    el.style.opacity = '0';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
  }

  function animateCopy(btn){
    if(!btn) return;
    btn.classList.add('copied');
    const def = btn.querySelector('.label-default');
    const ok = btn.querySelector('.label-copied');
    if(def && ok){ def.style.display='none'; ok.style.display='inline-flex'; }
    setTimeout(()=>{ 
      btn.classList.remove('copied'); 
      if(def && ok){ def.style.display='inline'; ok.style.display='none'; }
    }, 2400);
  }

  window.copyEmail = function copyEmail(){
    const email = 'janescoda49@gmail.com';
    const btn = document.getElementById('copyBtn');
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(email).then(()=> animateCopy(btn)).catch(()=>{ fallbackCopy(email); animateCopy(btn); });
    } else {
      fallbackCopy(email); animateCopy(btn);
    }
  };

  document.addEventListener('click', function(e){
    const btn = e.target.closest && e.target.closest('#copyBtn');
    if(btn) copyEmail();
  }, {capture:true});
})();
</script>

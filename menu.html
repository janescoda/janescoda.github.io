<!-- menu.html -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap');

:root{
  --nav-height: 4.6rem;
  --page-side-padding: 3.3rem;
  --title: #000;
  --text: #67677a;
  --border: #e4e2dd;
  --transition: 0.28s cubic-bezier(.4,0,.2,1);
  --accent-blue: #1e7bf6;
}

/* NAV BASE */
.site-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-height);
  display:flex; align-items:center; justify-content:center;
  background: #fff;
  z-index: 9999;
  border-bottom: none;
}

.site-nav .nav-inner {
  width:100%; max-width:1200px; padding:0 var(--page-side-padding);
  display:flex; justify-content:space-between; align-items:center;
}

.nav-logo { 
  font-weight:800; 
  color:var(--title); 
  letter-spacing:-0.02em; 
  font-size:1.155rem; 
}

/* DESKTOP RIGHT AREA */
.nav-right { 
  display:flex; 
  gap:1.6rem; 
  align-items:center; 
}

.nav-link { 
  color:var(--text); 
  font-weight:600; 
  font-size:1.045rem; 
  padding:.25rem .15rem; 
} 

.nav-link:hover, .nav-link.is-active { 
  color:var(--title); 
  font-weight:800; 
}

/* Copy email button */
.copy-btn{
  font-family: 'Sora', sans-serif;
  font-weight:700;
  font-size:1.078rem;
  padding:0.7rem 1.6rem;
  border-radius:999px;
  background:var(--title);
  color:#fff;
  border:1.5px solid var(--title);
  display:inline-flex; 
  align-items:center; 
  gap:.35rem;
  cursor:pointer; 
  transition: all var(--transition);
}
.copy-btn.copied { 
  background:transparent; 
  color:var(--title); 
  border-color:var(--title); 
  pointer-events:none; 
}
.copy-btn:hover { 
  transform:translateY(-1px); 
  background:transparent; 
  color:var(--title); 
}

.site-nav a:focus, 
.site-nav button:focus { 
  outline: none; 
}

/* HAMBURGER BUTTON */
.nav-toggle {
  display: none; /* solo se ve en móvil */
  width: 40px;
  height: 40px;
  border-radius: 999px;
  border: none;
  background: transparent;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  padding: 0;
  z-index: 10000; /* por si acaso */
}

.nav-toggle-box {
  width: 18px;
  height: 14px;
  position: relative;
}

.nav-toggle-line {
  position: absolute;
  left: 0;
  right: 0;
  height: 2px;
  background: #000;
  border-radius: 999px;
  transition: transform var(--transition), opacity var(--transition), top var(--transition), bottom var(--transition);
}

.nav-toggle-line:nth-child(1) { top: 0; }
.nav-toggle-line:nth-child(2) { top: 6px; }
.nav-toggle-line:nth-child(3) { bottom: 0; }

/* Estado abierto */
.site-nav.is-open .nav-toggle-line:nth-child(1) {
  top: 6px;
  transform: rotate(45deg);
}
.site-nav.is-open .nav-toggle-line:nth-child(2) {
  opacity: 0;
}
.site-nav.is-open .nav-toggle-line:nth-child(3) {
  bottom: 6px;
  transform: rotate(-45deg);
}

/* MENÚ MÓVIL DENTRO DEL NAV */
.nav-right-mobile {
  display: none;
}

/* DESKTOP */
@media (min-width:769px){
  .nav-right {
    display:flex;
  }
  .nav-toggle {
    display:none;
  }
}

/* MOBILE */
@media (max-width:768px){
  .site-nav .nav-inner {
    padding: 0 1.5rem;
  }

  .nav-logo { 
    font-size:1.1rem; 
  }

  .nav-right {
    display:none; /* ocultar menú horizontal */
  }

  .nav-toggle {
    display: inline-flex; /* mostrar botón hamburguesa */
  }

  .nav-right-mobile {
    position: absolute;
    top: var(--nav-height);
    left: 0;
    right: 0;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: none;
    flex-direction: column;
    padding: 0.8rem 1.5rem 1.3rem;
    gap: 0.6rem;
  }

  .site-nav.is-open .nav-right-mobile {
    display: flex;
  }

  .nav-right-mobile a.nav-link {
    padding: 0.35rem 0;
    font-size: 1rem;
  }

  .nav-right-mobile .copy-btn {
    width: 100%;
    justify-content: center;
    font-size: 0.98rem;
    padding: 0.6rem 1.2rem;
  }
}
</style>

<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <!-- LOGO -->
    <a class="nav-logo" href="index.html#scroll">JEO</a>

    <!-- MENÚ DESKTOP -->
    <div class="nav-right" role="menubar">
      <a class="nav-link" href="index.html#work" role="menuitem">Work</a>
      <a class="nav-link" href="about.html" role="menuitem">About</a>

      <button class="copy-btn" id="copyBtn" aria-label="Copy email">
        <span class="label-default">Copy email</span>
        <span class="label-copied" style="display:none;">
          <svg class="check-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
          Copied
        </span>
      </button>
    </div>

    <!-- HAMBURGUESA (MÓVIL) -->
    <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
      <span class="nav-toggle-box">
        <span class="nav-toggle-line"></span>
        <span class="nav-toggle-line"></span>
        <span class="nav-toggle-line"></span>
      </span>
    </button>
  </div>

  <!-- MENÚ MÓVIL DENTRO DEL NAV -->
  <div class="nav-right-mobile" role="menubar">
    <a class="nav-link" href="index.html#work" role="menuitem">Work</a>
    <a class="nav-link" href="about.html" role="menuitem">About</a>

    <button class="copy-btn" id="copyBtnMobile" aria-label="Copy email">
      <span class="label-default">Copy email</span>
      <span class="label-copied" style="display:none;">
        <svg class="check-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
        Copied
      </span>
    </button>
  </div>
</nav>

<script>
  // Hacemos la función global para poder llamarla desde index.html / about.html
  window.initMenu = function initMenu(){
    const nav = document.querySelector('.site-nav');
    if (!nav) return;

    const toggleBtn   = nav.querySelector('.nav-toggle');
    const mobileMenu  = nav.querySelector('.nav-right-mobile');
    const logoLink    = nav.querySelector('.nav-logo');

    // Asegurarnos de que el logo es clicable
    if (logoLink) {
      logoLink.style.pointerEvents = 'auto';
    }

    // Abrir/cerrar menú móvil
    if (toggleBtn && mobileMenu) {
      toggleBtn.style.pointerEvents = 'auto';

      toggleBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        const isOpen = nav.classList.toggle('is-open');
        toggleBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });

      // Cerrar menú al hacer click en un enlace móvil
      mobileMenu.addEventListener('click', function(e) {
        if (e.target.matches('.nav-link')) {
          nav.classList.remove('is-open');
          toggleBtn.setAttribute('aria-expanded', 'false');
        }
      });

      // Cerrar si hago click en cualquier sitio fuera del nav
      document.addEventListener('click', function(e) {
        if (!nav.contains(e.target)) {
          nav.classList.remove('is-open');
          toggleBtn.setAttribute('aria-expanded', 'false');
        }
      });
    }

    // Botón de copiar del menú móvil
    const copyBtnMobile = nav.querySelector('#copyBtnMobile');
    if (copyBtnMobile) {
      copyBtnMobile.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (typeof copyEmail === 'function') {
          copyEmail();
        }
      });
    }
  };
</script>
